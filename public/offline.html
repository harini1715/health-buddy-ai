<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HealthTwin AI - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: hsl(200, 25%, 6%);
      color: hsl(200, 10%, 92%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon {
      width: 80px; height: 80px;
      margin: 0 auto 1.5rem;
      border-radius: 1rem;
      background: linear-gradient(135deg, hsl(168, 70%, 38%), hsl(185, 65%, 42%));
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.75rem; }
    p { color: hsl(200, 10%, 55%); line-height: 1.6; margin-bottom: 1.5rem; }
    button {
      padding: 0.75rem 2rem;
      border-radius: 0.75rem;
      border: none;
      background: linear-gradient(135deg, hsl(168, 70%, 38%), hsl(185, 65%, 42%));
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
    }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>No internet connection detected. Your data is safely saved locally and will sync automatically when you're back online.</p>
    <button onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>
